<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nkgere Louis Mashele | Portfolio</title>

    <meta name="description" content="Personal Portfolio of Louis Mashele - IT Graduate, Developer, and Problem Solver.">

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/skills.css">
    <link rel="stylesheet" href="css/projects.css">
    <link rel="stylesheet" href="css/certificates.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->
    <header id="navbar-container">
        <!-- Loaded dynamically from components/navbar.html -->
    </header>

    <!-- ================= MAIN CONTENT ================= -->
    <main>

        <!-- HERO SECTION -->
        <section id="home" class="hero-section">
            <div class="container">

                <div class="hero-content">

                    <div class="hero-text">

                        <span class="hero-greeting">Hello, I'm</span>

                        <h1 id="profile-name">Loading...</h1>

                        <h2 id="profile-title">
                            Information Technology Graduate
                        </h2>

                        <p id="profile-description">
                            Loading profile description...
                        </p>

                        <div class="hero-buttons">
                            <a href="#projects" class="btn primary-btn">
                                View Projects
                            </a>

                            <a href="#contact" class="btn secondary-btn">
                                Contact Me
                            </a>
                        </div>

                    </div>

                    <div class="hero-image">
                        <img id="profile-image" src="" alt="Profile">
                    </div>

                </div>

            </div>
        </section>

        <!-- ABOUT SECTION -->
        <section id="about" class="about-section">
            <div class="container">

                <h2 class="section-title">About Me</h2>

                <div id="about-content">
                    <!-- Firebase injected content -->
                </div>

            </div>
        </section>

        <!-- SKILLS SECTION -->
        <section id="skills" class="skills-section">
            <div class="container">

                <h2 class="section-title">Skills</h2>

                <div id="skills-grid" class="skills-grid">
                    <!-- Firebase skills rendered here -->
                </div>

            </div>
        </section>

        <!-- PROJECTS SECTION -->
        <section id="projects" class="projects-section">
            <div class="container">

                <h2 class="section-title">Projects</h2>

                <div id="projects-grid" class="projects-grid">
                    <!-- Firebase projects rendered here -->
                </div>

            </div>
        </section>

        <!-- CERTIFICATES SECTION -->
        <section id="certificates" class="certificates-section">
            <div class="container">

                <h2 class="section-title">Certificates</h2>

                <div id="certificates-grid" class="certificates-grid">
                    <!-- Firebase certificates rendered here -->
                </div>

            </div>
        </section>

        <!-- CONTACT SECTION -->
        <section id="contact" class="contact-section">
            <div class="container">

                <h2 class="section-title">Contact Me</h2>

                <div id="contact-content">
                    <!-- Firebase contact info -->
                </div>

            </div>
        </section>

    </main>

    <!-- ================= FOOTER ================= -->
    <footer id="footer-container">
        <!-- Loaded dynamically from components/footer.html -->
    </footer>

    <!-- ================= JAVASCRIPT ================= -->
    <script type="module" src="js/main.js"></script>
    <script type="module" src="./js/test-firestore.js"></script>
</body>
</html>
